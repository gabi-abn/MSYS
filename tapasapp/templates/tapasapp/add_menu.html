{% extends 'tapasapp/base.html' %}
{% load static %}

{% block sidenav %}
<li><a href="/">Back to main</a></li>
{% endblock %}

{% block content %}
<div class="border rounded bg-light" style="max-width:900px; margin:auto; margin-top:40px;">
    
    <div class="border-bottom p-3">
        <h3>Type in Dish Details:</h3>
    </div>

    <div class="bg-white" style="padding:30px;">
        <form>
            <div class="mb-3">
                <label for="dish_name" class="form-label">Name:</label>
                <input type="text" class="form-control" id="dish_name" name="dish_name">
            </div>

            <div class="row">
                <div class="col">
                    <label for="cook_time" class="form-label">Cook Time:</label>
                    <input type="text" class="form-control" id="cook_time" name="cook_time">
                </div>

                <div class="col">
                    <label for="prep_time" class="form-label">Prep Time:</label>
                    <input type="text" class="form-control" id="prep_time" name="prep_time">
                </div>
            </div>

            <button class="btn btn-secondary mt-4">Add to dishes</button>
        </form>
    </div>

</div>
{% endblock %}
